apiVersion: batch/v1
kind: Job
metadata:
  name: animal2vec-manifest-soundofbees
spec:
  template:
    spec:
      containers:
      - name: animal2vec
        image: ccu-k8s.inf.uni-konstanz.de:32250/mattia.montanari/animal2vec:v2
        command: ["/bin/bash", "-c"]
        args:
          - |
            python /abyss/home/Sound-of-Bees/detection_through_deep_learning/animal2vec/scripts/animal2vec_manifest.py /abyss/home/dataset_preprocessed/SoundOfBees_10s_2026-03-05/wav/24000Hz/byss_home_dataset_raw --dest /abyss/home/dataset_preprocessed/SoundOfBees_10s_2026-03-05/manifest --ext wav --valid-percent 0.1 --n-split 1
        resources:
          requests:
            cpu: "8"      # ↓ Da 20 (IO bound)
            memory: "64Gi" # ↓ Da 250Gi (solo scan files)
          limits:
            cpu: "16"
            memory: "128Gi"
        volumeMounts:
          - mountPath: /abyss/home
            name: cephfs-home
            readOnly: false
          - mountPath: /abyss/shared
            name: cephfs-shared
            readOnly: false
          - mountPath: /abyss/datasets
            name: cephfs-datasets
            readOnly: true
      imagePullSecrets:
      - name: registry-ro-login
      restartPolicy: OnFailure
      volumes:
        - name: cephfs-home
          hostPath:
            path: "/cephfs/abyss/home/mattia-montanari"
            type: Directory
        - name: cephfs-shared
          hostPath:
            path: "/cephfs/abyss/shared"
            type: Directory
        - name: cephfs-datasets
          hostPath:
            path: "/cephfs/abyss/datasets"
            type: Directory

