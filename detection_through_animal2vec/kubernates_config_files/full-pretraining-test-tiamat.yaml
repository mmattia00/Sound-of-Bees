apiVersion: batch/v1
kind: Job
metadata:
  namespace: user-mattia-montanari
  name: full-bee-pretrain-tiamat
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      nodeName: tiamat
      tolerations:
        - key: "gpumem"
          operator: "Equal"
          value: "40"
          effect: "NoSchedule"
      containers:
      - name: bee-pretrain
        image: ccu-k8s.inf.uni-konstanz.de:32250/mattia.montanari/animal2vec:v3
        command: ["/bin/bash", "-c"]
        args:
        - |
          /bin/bash /abyss/home/timon-nas/Sound-of-Bees/detection_through_deep_learning/animal2vec/scripts/launch_full_pretrain_tiamat.sh
        resources:
          requests:
            cpu: "60"
            memory: "390Gi"
            nvidia.com/gpu: "4"
          limits:
            cpu: "60"
            memory: "390Gi"
            nvidia.com/gpu: "4"
        volumeMounts:
          - mountPath: /abyss/home
            name: cephfs-home
            readOnly: false
          - mountPath: /abyss/shared
            name: cephfs-shared
            readOnly: false
          - mountPath: /abyss/datasets
            name: cephfs-datasets
            readOnly: true
          - mountPath: /local
            name: local-storage
            readOnly: false
          - mountPath: /dev/shm
            name: dshm
          - mountPath: /abyss/home/timon-nas
            name: samba-share
            readOnly: false
      imagePullSecrets:
        - name: registry-ro-login
      volumes:
        - name: cephfs-home
          hostPath:
            path: "/cephfs/abyss/home/mattia-montanari"
            type: Directory
        - name: cephfs-shared
          hostPath:
            path: "/cephfs/abyss/shared"
            type: Directory
        - name: cephfs-datasets
          hostPath:
            path: "/cephfs/abyss/datasets"
            type: Directory
        - name: local-storage
          hostPath:
            path: "/raid/local-data/mattia-montanari"
            type: DirectoryOrCreate
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 64Gi
        - name: samba-share
          flexVolume:
            driver: "fstab/cifs"
            fsType: "cifs"
            secretRef:
              name: "cifs-secret"
            options:
              networkPath: "//timon.cascb.uni-konstanz.de/A26-03-0300"
              mountOptions: "vers=3.0,dir_mode=0755,file_mode=0644,noperm,domain=CASCB"