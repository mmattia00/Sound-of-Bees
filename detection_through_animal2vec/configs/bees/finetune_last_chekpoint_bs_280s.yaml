# @package _group_


hydra:
  run:
    dir: outputs/${now:%Y-%m-%d_%H-%M-%S}_ft_checkpoint


common:
  fp16: true
  log_format: json
  log_interval: 7          # 1 log per epoca (7 optimizer updates per epoca)
  tensorboard_logdir: tb
  min_loss_scale: 1e-6
  fp16_no_flatten_grads: true
  fp16_init_scale: 1
  all_gather_list_size: 65536


checkpoint:
  save_interval: 5          # salva ogni 5 epoche
  keep_last_epochs: 5
  best_checkpoint_metric: metrics/finetune/f1
  maximize_best_checkpoint_metric: true


task:
  _name: audio_ccas
  data: /local/labelled_dataset_no_augmentation/preprocessed_audios/Bees_10s_2026-06-15/manifest
  unique_labels: "['stop_signal_candidate']"
  conv_feature_layers: '[(127, 63, 1)] +[(512, 10, 5)] + [(512, 3, 4)] + [(512, 3, 3)] + [(512, 3, 2)] + [(512, 3, 1)] + [(512, 2, 1)] * 2'
  min_sample_size: 1
  max_sample_size: 240000   # 1 clip da 10s a 24kHz (10 * 24000 = 240000 samples)
  sample_rate: 24000
  normalize: true
  with_labels: true
  min_label_size: 1
  verbose_tensorboard_logging: false
  enable_padding: false


dataset:
  num_workers: 20
  max_tokens: 240000        # 1 clip da 10s per GPU per step (240000 samples @ 24kHz)
  skip_invalid_size_inputs_valid_test: true
  validate_interval: 1      # validazione ogni epoca
  validate_interval_updates: 0
  required_batch_size_multiple: 1
  train_subset: train_0     # corpus di training: train_0.tsv — totale ~1900 secondi (~190 clip da 10s)
  valid_subset: valid_0


distributed_training:
  distributed_world_size: 4  # 4 GPU
  ddp_backend: legacy_ddp


criterion:
  _name: finetunecriterion
  label_smoothing: 0.0
  report_accuracy: true
  segmentation_metrics: true
  use_focal_loss: true
  metric_threshold: .175
  method: "avg"
  sigma_s: 0.1
  maxfilt_s: 0.1
  max_duration_s: 0.5
  lowP: 0.125


optimization:
  update_freq: [ 7 ]
  # Effective batch size = (max_tokens / sample_rate) * world_size * update_freq
  #                      = (240000 / 24000) * 4 * 7
  #                      = 10 * 4 * 7 = 280 secondi per optimizer update (28 clip da 10s)
  # Update per epoca = corpus_totale / B_eff = 1900 / 280 ~7 update/epoca
  max_update: 2100
  # 300 epoche × 7 update/epoca = 2100 optimizer updates totali
  lr: [ 0.00003 ]


optimizer:
  _name: adam
  adam_betas: (0.9,0.98)
  adam_eps: 1e-08


lr_scheduler:
  _name: cosine
  warmup_updates: 210
  # 10% di max_update (2100 * 0.10 = 210), corrispondente a ~30 epoche di warmup
  warmup_init_lr: 1e-10
  min_lr: 5e-06


model:
  _name: wav2vec_ccas_finetune
  w2v_path: /local/checkpoint_last.pt
  freeze_finetune_updates: 252
  # Il freeze termina poco dopo il warmup (~1-2 epoche dopo):
  # warmup finisce a update 210, freeze finisce a update 252 (≈ 2 epoche dopo = 14 update in più)
  feature_grad_mult: 0.0
  apply_mask: true
  average_top_k_layers: 12
  mask_prob: 0.825
  mask_length: 4
  mask_channel_prob: 0
  mask_channel_length: 64
  dropout: 0.1
  dropout_input: 0.0
  activation_dropout: 0.1
  attention_dropout: 0.2
  final_dropout: 0.0
  layerdrop: 0.0
  drop_path: 0.0
  target_mixup: true
  source_mixup: 0.5
  mixup_prob: 1.0
  same_mixup: true
  mixing_window_length: 0.05
  gain_mode: "A_weighting"
  load_pretrain_weights: true