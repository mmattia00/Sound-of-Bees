apiVersion: batch/v1
kind: Job
metadata:
  name: animal2vec-preprocess-24k
spec:
  template:
    spec:
      containers:
      - name: animal2vec
        image: ccu-k8s.inf.uni-konstanz.de:32250/mattia.montanari/animal2vec:v2
        command: ["/bin/bash", "-c", "python /abyss/home/Sound-of-Bees/detection_through_deep_learning/animal2vec/scripts/prepare_arb_data_for_audio_pretraining.py --input-folder /abyss/home/dataset_raw --output-folder /abyss/home/dataset_preprocessed --base-name SoundOfBees --segment-length 10 --resample-rate 24000"]
        resources:
          requests:
            cpu: "20"
            memory: "250Gi"
          limits:
            cpu: "20"
            memory: "250Gi"
        volumeMounts:
          - mountPath: /abyss/home
            name: cephfs-home
            readOnly: false
          - mountPath: /abyss/shared
            name: cephfs-shared
            readOnly: false
          - mountPath: /abyss/datasets
            name: cephfs-datasets
            readOnly: true
      imagePullSecrets:
      - name: registry-ro-login
      restartPolicy: OnFailure
      volumes:
        - name: cephfs-home
          hostPath:
            path: "/cephfs/abyss/home/mattia-montanari"
            type: Directory
        - name: cephfs-shared
          hostPath:
            path: "/cephfs/abyss/shared"
            type: Directory
        - name: cephfs-datasets
          hostPath:
            path: "/cephfs/abyss/datasets"
            type: Directory

