apiVersion: batch/v1
kind: Job
metadata:
  name: vecna-pretrain-test
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: vecna
      tolerations:
      - key: "gpumem"
        operator: "Equal"
        value: "32"
        effect: "NoSchedule"
      containers:
      - name: bee-pretrain-container
        image: ccu-k8s.inf.uni-konstanz.de:32250/mattia.montanari/animal2vec:v3
        command: ["/bin/sh"]
        args: ["-c", "/abyss/home/Sound-of-Bees/detection_through_deep_learning/animal2vec/scripts/launch_test_julian_setup.sh"]
        resources:
          requests:
            cpu: 50
            nvidia.com/gpu: 4
            memory: 395Gi
          limits:
            cpu: 50
            nvidia.com/gpu: 4
            memory: 395Gi
        volumeMounts:
          - mountPath: /abyss/home
            name: cephfs-home
            readOnly: false
          - mountPath: /abyss/shared
            name: cephfs-shared
            readOnly: false
          - mountPath: /abyss/datasets
            name: cephfs-datasets
            readOnly: true
          - mountPath: /local
            name: local-storage
            readOnly: false
          - mountPath: /dev/shm
            name: dshm
        ports:
          - containerPort: 8080
      restartPolicy: Never
      imagePullSecrets:
        - name: registry-ro-login
      volumes:
        - name: cephfs-home
          hostPath:
            path: "/cephfs/abyss/home/mattia-montanari"
            type: Directory
        - name: cephfs-shared
          hostPath:
            path: "/cephfs/abyss/shared"
            type: Directory
        - name: cephfs-datasets
          hostPath:
            path: "/cephfs/abyss/datasets"
            type: Directory
        - name: local-storage
          hostPath:
            path: "/raid/local-data/mattia-montanari"
            type: DirectoryOrCreate
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 64Gi

